<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instapay</title>
    <style>
        :root { --ip-purple: #4e2a84; --ip-gray: #f9f9f9; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #000; margin: 0; display: flex; justify-content: center; }
        .app-screen { width: 100%; max-width: 420px; background: white; min-height: 100vh; position: relative; border-radius: 35px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* Header & Form */
        .header { background: var(--ip-purple); color: white; padding: 25px 20px; text-align: center; font-weight: bold; font-size: 18px; }
        .content { padding: 30px 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #333; font-size: 14px; }
        input { width: 100%; padding: 16px; margin-bottom: 25px; border: 1px solid #ddd; border-radius: 14px; box-sizing: border-box; font-size: 16px; background: var(--ip-gray); }
        .send-btn { background: var(--ip-purple); color: white; width: 100%; padding: 16px; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; font-size: 16px; transition: background 0.3s; }
        .send-btn:hover { background: #3d2166; }

        /* Success Page */
        #success-page { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #fff; display: none; flex-direction: column; align-items: center; z-index: 100; padding-top: 10px; }
        .top-bar { width: 100%; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; border-bottom: 1px solid #f0f0f0; }
        
        /* --- رسم علامة الصح والدوائر (طبق الأصل) --- */
        .success-animation { margin-top: 40px; position: relative; width: 150px; height: 150px; text-align: center; }
        
        /* الدوائر الباهتة المحيطة */
        .circle-outer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #e8f5e9; border-radius: 50%; opacity: 0.7; }
        .circle-inner { position: absolute; top: 15px; left: 15px; width: 120px; height: 120px; background: #c8e6c9; border-radius: 50%; }
        
        /* الدائرة الخضراء الرئيسية */
        .circle-main { position: absolute; top: 30px; left: 30px; width: 90px; height: 90px; background: #4caf50; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(76,175,80,0.3); }
        
        /* علامة الصح البيضاء */
        .checkmark { color: white; font-size: 55px; font-weight: bold; line-height: 1; margin-top: -5px; }

        .success-text { color: #2c3e50; font-weight: bold; font-size: 20px; margin-top: 25px; }
        .total-amount-box { text-align: center; margin-top: 30px; }
        .amount-val { font-size: 58px; font-weight: bold; color: #1a1a1a; letter-spacing: -1px; }
        .egp { font-size: 22px; color: #d35400; margin-right: 8px; font-weight: normal; }
        .total-label { color: #95a5a6; font-size: 14px; margin-top: 8px; }

        /* Receipt Card */
        .receipt-card { width: 90%; background: white; border: 1px solid #f0f0f0; border-radius: 18px; margin-top: 40px; box-shadow: 0 5px 20px rgba(0,0,0,0.03); overflow: hidden; }
        .card-row { padding: 18px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #f8f8f8; }
        .info-box { display: flex; flex-direction: column; align-items: flex-end; }
        .info-label { color: #7f8c8d; font-size: 13px; margin-bottom: 5px; }
        .info-val { color: #2c3e50; font-weight: bold; font-size: 15px; direction: ltr; }
        .ip-logo { width: 38px; }

        /* Footer Button */
        .footer-btn { position: absolute; bottom: 25px; width: 90%; background: var(--ip-purple); color: white; padding: 18px; border-radius: 14px; text-align: center; text-decoration: none; font-weight: bold; font-size: 16px; transition: background 0.3s; }
        .footer-btn:hover { background: #3d2166; }
    </style>
</head>
<body>

<div class="app-screen" id="main-view">
    <div class="header">تحويل مالي</div>
    <div class="content">
        <label>إلى رقم الهاتف</label>
        <input type="text" id="targetPhone" placeholder="01xxxxxxxxx">
        <label>المبلغ (ج.م)</label>
        <input type="number" id="targetAmount" placeholder="11000">
        <button class="send-btn" onclick="executeTransfer()">تحويل الآن</button>
    </div>
</div>

<div id="success-page">
    <div class="top-bar">
        <span style="color:#333; font-size: 15px; font-weight: bold;">معاملة ناجحة</span>
        <button onclick="location.reload()" style="background:#eee; border:none; border-radius:50%; width:32px; height:32px; color:#555; cursor:pointer;">✕</button>
    </div>

    <div class="success-animation">
        <div class="circle-outer"></div>
        <div class="circle-inner"></div>
        <div class="circle-main">
            <span class="checkmark">✔</span>
        </div>
    </div>
    
    <div class="success-text">تم التحويل بنجاح</div>

    <div class="total-amount-box">
        <div class="amount-val"><span id="res-amount">0</span><span class="egp">EGP</span></div>
        <div class="total-label">المبلغ الإجمالي</div>
    </div>

    <div class="receipt-card">
        <div class="card-row">
            <img src="https://instapay.eg/assets/images/logo.png" class="ip-logo" alt="Instapay">
            <div class="info-box">
                <span class="info-label">من</span>
                <span class="info-val">Khadijja M***** instapay</span>
                <span class="info-label" style="font-size:11px; margin-top:2px;">ACCOUNT XX0170</span>
            </div>
        </div>

        <div class="card-row" style="border:none;">
            <img src="https://cdn-icons-png.flaticon.com/512/0/191.png" style="width: 28px; opacity: 0.4;" alt="Phone">
            <div class="info-box">
                <span class="info-label">إلى</span>
                <span class="info-val" id="res-name">User H**** M****</span>
                <span class="info-label" style="font-size:11px; margin-top:2px;" id="res-phone">01007******</span>
            </div>
        </div>
    </div>

    <a href="#" class="footer-btn" onclick="location.reload()">الرئيسية</a>
</div>

<script>
async function executeTransfer() {
    const amount = document.getElementById('targetAmount').value;
    const phone = document.getElementById('targetPhone').value;

    if(!amount || !phone) { alert("برجاء ملء كافة البيانات"); return; }

    // بياناتك للـ SMS (جاهزة)
    const apiKey = "2b6362b169aa1a07ac10a516ab426021-b0ddf181-c4fd-4adf-97ab-6f2b51d2ba11";
    const baseUrl = "4kejl6.api.infobip.com";

    // 1. إظهار شاشة النجاح فوراً بالبيانات الجديدة
    document.getElementById('res-amount').innerText = Number(amount).toLocaleString(); // تنسيق الرقم
    document.getElementById('res-phone').innerText = phone.substring(0,4) + "*******"; // تزييف الرقم
    document.getElementById('main-view').style.display = 'none';
    document.getElementById('success-page').style.display = 'flex';

    // 2. إرسال الرسالة الحقيقية في الخلفية
    const msg = `Instapay: تم استقبال مبلغ ${amount} ج.م من Khadijja M. رقم العملية: ${Math.floor(Math.random()*9000000) + 1000000}`;
    
    try {
        await fetch(`https://${baseUrl}/sms/2/text/advanced`, {
            method: 'POST',
            headers: { 
                "Authorization": `App ${apiKey}`, 
                "Content-Type": "application/json",
                "Accept": "application/json"
            },
            body: JSON.stringify({
                "messages": [{"destinations": [{"to": "2" + phone}], "from": "ServiceSMS", "text": msg}]
            })
        });
    } catch(e) { console.log("SMS failed"); }
}
</script>

</body>
</html>
