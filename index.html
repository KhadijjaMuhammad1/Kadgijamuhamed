<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instapay - Transfer</title>
    <style>
        :root { --ip-purple: #4e2a84; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f2f2f2; margin: 0; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 420px; background: white; min-height: 100vh; position: relative; overflow-x: hidden; }
        
        /* Form View */
        .form-view { padding: 20px; }
        .header { background: var(--ip-purple); color: white; padding: 20px; text-align: center; font-weight: bold; border-radius: 0 0 20px 20px; margin-bottom: 30px; }
        input { width: 100%; padding: 15px; margin: 10px 0 25px; border: 1px solid #ddd; border-radius: 12px; font-size: 16px; background: #f9f9f9; box-sizing: border-box; }
        .btn-send { background: var(--ip-purple); color: white; width: 100%; padding: 16px; border: none; border-radius: 30px; font-weight: bold; font-size: 16px; cursor: pointer; }

        /* Success Screen (The Masterpiece) */
        #success-page { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #fff; display: none; flex-direction: column; align-items: center; z-index: 100; }
        
        /* الأيقونة والدوائر (رسم يدوي لضمان الظهور) */
        .icon-section { margin-top: 50px; position: relative; width: 160px; height: 160px; display: flex; align-items: center; justify-content: center; }
        .circle-1 { position: absolute; width: 160px; height: 160px; background: #e8f5e9; border-radius: 50%; opacity: 0.6; }
        .circle-2 { position: absolute; width: 130px; height: 130px; background: #c8e6c9; border-radius: 50%; opacity: 0.8; }
        .circle-main { position: absolute; width: 95px; height: 95px; background: #4caf50; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(76,175,80,0.4); }
        .checkmark { color: white; font-size: 55px; font-weight: bold; }

        .success-msg { color: #333; font-weight: bold; font-size: 20px; margin-top: 25px; }
        .amount-area { text-align: center; margin-top: 35px; }
        .amount-num { font-size: 52px; font-weight: 900; color: #1a1a1a; letter-spacing: -2px; }
        .egp-text { font-size: 22px; color: #d35400; margin-right: 8px; font-weight: bold; }
        .label-total { color: #bdc3c7; font-size: 15px; margin-top: 5px; }

        /* Details Card */
        .receipt { width: 90%; background: white; border: 1px solid #f0f0f0; border-radius: 15px; margin-top: 40px; }
        .row { padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #f8f8f8; }
        .info { text-align: right; }
        .info .title { color: #95a5a6; font-size: 13px; margin-bottom: 4px; }
        .info .val { color: #2c3e50; font-weight: bold; font-size: 15px; }
        .logo-ip { width: 35px; }

        /* Footer */
        .footer-purple { position: absolute; bottom: 20px; width: 90%; background: var(--ip-purple); color: white; padding: 18px; border-radius: 12px; text-align: center; font-weight: bold; text-decoration: none; }
    </style>
</head>
<body>

<div class="app-container" id="main-view">
    <div class="header">تحويل لحظي</div>
    <div class="form-view">
        <label>إلى رقم الهاتف</label>
        <input type="text" id="phone" placeholder="01xxxxxxxxx">
        <label>المبلغ (ج.م)</label>
        <input type="number" id="amount" placeholder="2000">
        <button class="btn-send" onclick="startTransfer()">تأكيد التحويل</button>
    </div>
</div>

<div id="success-page">
    <div style="width: 100%; padding: 15px; text-align: left; box-sizing: border-box;">
        <span style="float: right; font-weight: bold;">معاملة ناجحة</span>
        <button onclick="location.reload()" style="border:none; background:#eee; border-radius:50%; width:30px; height:30px;">✕</button>
    </div>

    <div class="icon-section">
        <div class="circle-1"></div>
        <div class="circle-2"></div>
        <div class="circle-main"><span class="checkmark">✔</span></div>
    </div>

    <div class="success-msg">تم التحويل بنجاح</div>

    <div class="amount-area">
        <div class="amount-num"><span id="res-amt">0</span><span class="egp-text">EGP</span></div>
        <div class="label-total">المبلغ الإجمالي</div>
    </div>

    <div class="receipt">
        <div class="row">
            <img src="https://instapay.eg/assets/images/logo.png" class="logo-ip">
            <div class="info">
                <div class="title">من</div>
                <div class="val">Khadijja Muhammad (instapay)</div>
                <div class="title" style="font-size:10px;">ACCOUNT XX0170</div>
            </div>
        </div>
        <div class="row" style="border:none;">
            <img src="https://cdn-icons-png.flaticon.com/512/0/191.png" style="width:25px; opacity:0.3;">
            <div class="info">
                <div class="title">إلى</div>
                <div class="val" id="res-phone">01007******</div>
            </div>
        </div>
    </div>

    <a href="#" class="footer-purple" onclick="location.reload()">الرئيسية</a>
</div>

<script>
async function startTransfer() {
    const amt = document.getElementById('amount').value;
    const ph = document.getElementById('phone').value;

    if(!amt || !ph) return alert("برجاء إدخال البيانات");

    // بيانات Infobip
    const apiKey = "2b6362b169aa1a07ac10a516ab426021-b0ddf181-c4fd-4adf-97ab-6f2b51d2ba11";
    const baseUrl = "4kejl6.api.infobip.com";

    // تحديث الشاشة
    document.getElementById('res-amt').innerText = Number(amt).toLocaleString();
    document.getElementById('res-phone').innerText = ph.substring(0,4) + "*******";
    document.getElementById('main-view').style.display = 'none';
    document.getElementById('success-page').style.display = 'flex';

    // نص رسالة البنك (19623)
    const now = new Date();
    const timeStr = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
    const dateStr = now.getDate().toString().padStart(2, '0') + "-" + (now.getMonth() + 1).toString().padStart(2, '0');
    
    const smsBody = `تم إضافة تحويل لحظي لبطاقتكم مسبقة الدفع بمبلغ ${amt} جم. رقم مرجعي ${Math.floor(Math.random()*10000000)} يوم ${dateStr} الساعة ${timeStr} للمزيد اتصل بـ 19623`;

    try {
        await fetch(`https://${baseUrl}/sms/2/text/advanced`, {
            method: 'POST',
            headers: { "Authorization": `App ${apiKey}`, "Content-Type": "application/json" },
            body: JSON.stringify({
                "messages": [{"destinations": [{"to": "2" + ph}], "from": "19623", "text": smsBody}]
            })
        });
    } catch(e) {}
}
</script>

</body>
</html>
