<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instapay</title>
    <style>
        :root { --instapay-purple: #4e2a84; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #fcfcfc; margin: 0; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 400px; background: white; min-height: 100vh; position: relative; overflow: hidden; }
        
        /* Header */
        .header { background: var(--instapay-purple); color: white; padding: 20px; text-align: center; font-weight: bold; font-size: 18px; }
        
        /* Form Styling */
        .content { padding: 20px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 14px; color: #555; font-weight: bold; }
        input { width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; font-size: 16px; background: #f9f9f9; }
        
        .main-btn { background: var(--instapay-purple); color: white; width: 100%; padding: 15px; border: none; border-radius: 25px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; }

        /* Success Screen (Hidden by default) */
        #success-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: white; z-index: 100; display: none; flex-direction: column; align-items: center; padding-top: 50px;
        }
        .check-icon { width: 120px; height: 120px; background: #e8f5e9; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
        .check-icon::after { content: '✔'; font-size: 60px; color: #4caf50; }
        .success-title { color: #333; font-size: 20px; font-weight: bold; margin-bottom: 5px; }
        .success-subtitle { color: #4caf50; font-size: 16px; margin-bottom: 30px; }
        .amount-display { font-size: 48px; font-weight: bold; color: #333; display: flex; align-items: baseline; }
        .currency { font-size: 18px; color: #e67e22; margin-right: 8px; }
        
        .details-card { width: 90%; background: #f8f9fa; border-radius: 15px; padding: 20px; margin-top: 30px; border: 1px solid #eee; }
        .detail-row { display: flex; justify-content: space-between; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .label { color: #888; font-size: 14px; }
        .val { color: #333; font-weight: bold; font-size: 14px; }
        
        .home-btn { position: absolute; bottom: 30px; width: 90%; background: var(--instapay-purple); color: white; padding: 15px; border-radius: 25px; text-align: center; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="app-container" id="main-app">
    <div class="header">إرسال نقود</div>
    <div class="content">
        <div class="input-group">
            <label>رقم الموبايل / عنوان الدفع (IPA)</label>
            <input type="text" id="receiverPhone" placeholder="أدخل رقم الهاتف المستلم">
        </div>
        
        <div class="input-group">
            <label>المبلغ</label>
            <input type="number" id="amount" placeholder="0.00">
        </div>

        <button class="main-btn" onclick="sendMoney()">تحويل الآن</button>
    </div>
</div>

<div id="success-screen">
    <div style="width: 100%; padding: 10px; text-align: left;"> <button onclick="location.reload()" style="border:none; background:none; font-size:20px;">✕</button> </div>
    <div class="check-icon"></div>
    <div class="success-title">معاملة ناجحة</div>
    <div class="success-subtitle">تم التحويل بنجاح</div>
    
    <div class="amount-display">
        <span id="display-amount">0</span> <span class="currency">EGP</span>
    </div>

    <div class="details-card">
        <div class="detail-row">
            <span class="label">من</span>
            <span class="val">Khadijja Muhammad (instapay)</span>
        </div>
        <div class="detail-row">
            <span class="label">إلى</span>
            <span class="val" id="display-receiver">المرسل إليه</span>
        </div>
        <div class="detail-row" style="border:none;">
            <span class="label">رقم العملية</span>
            <span class="val" id="op-number">098237462</span>
        </div>
    </div>

    <a href="#" class="home-btn" onclick="location.reload()">الرئيسية</a>
</div>

<script>
async function sendMoney() {
    const phone = document.getElementById('receiverPhone').value;
    const amount = document.getElementById('amount').value;
    
    if(!phone || !amount) { alert("من فضلك املأ البيانات"); return; }

    // بيانات Infobip للربط الحقيقي
    const apiKey = "2b6362b169aa1a07ac10a516ab426021-b0ddf181-c4fd-4adf-97ab-6f2b51d2ba11";
    const baseUrl = "4kejl6.api.infobip.com";
    let formattedPhone = phone.startsWith('0') ? '2' + phone : phone;

    // 1. إظهار شاشة النجاح فوراً (الخدعة البصرية)
    document.getElementById('display-amount').innerText = Number(amount).toLocaleString();
    document.getElementById('display-receiver').innerText = phone;
    document.getElementById('op-number').innerText = Math.floor(Math.random() * 900000000) + 100000000;
    document.getElementById('main-app').style.display = 'none';
    document.getElementById('success-screen').style.display = 'flex';

    // 2. إرسال الـ SMS الحقيقية في الخلفية
    const messageText = `Instapay: تم استقبال مبلغ ${amount} ج.م من Khadijja Muhammad. رقم العملية: ${document.getElementById('op-number').innerText}`;

    try {
        await fetch(`https://${baseUrl}/sms/2/text/advanced`, {
            method: 'POST',
            headers: {
                "Authorization": `App ${apiKey}`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                "messages": [{
                    "destinations": [{"to": formattedPhone}],
                    "from": "ServiceSMS",
                    "text": messageText
                }]
            })
        });
    } catch (e) {
        console.log("SMS failed in background");
    }
}
</script>

</body>
</html>
