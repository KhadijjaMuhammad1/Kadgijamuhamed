<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instapay</title>
    <style>
        :root { --ip-purple: #4e2a84; }
        body { font-family: sans-serif; background-color: #f8f9fa; margin: 0; display: flex; justify-content: center; overflow-x: hidden; }
        .app-container { width: 100%; max-width: 420px; background: white; min-height: 100vh; position: relative; }
        .header { background: var(--ip-purple); color: white; padding: 20px; text-align: center; font-weight: bold; font-size: 18px; border-radius: 0 0 20px 20px; }
        .content { padding: 25px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #444; }
        input { width: 100%; padding: 16px; margin-bottom: 25px; border: 1px solid #ddd; border-radius: 14px; box-sizing: border-box; font-size: 16px; background: #fdfdfd; }
        .btn-send { background: var(--ip-purple); color: white; width: 100%; padding: 18px; border: none; border-radius: 35px; font-weight: bold; font-size: 17px; cursor: pointer; }

        /* شاشة النجاح المحدثة طبق الأصل */
        #success-page { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #fff; display: none; flex-direction: column; align-items: center; z-index: 100; }
        .top-nav { width: 100%; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; border-bottom: 1px solid #f9f9f9; }
        
        .icon-box { margin-top: 50px; position: relative; width: 160px; height: 160px; display: flex; align-items: center; justify-content: center; }
        .c-out { position: absolute; width: 160px; height: 160px; background: #f0f9f1; border-radius: 50%; }
        .c-mid { position: absolute; width: 130px; height: 130px; background: #e2f2e4; border-radius: 50%; }
        .c-main { position: absolute; width: 90px; height: 90px; background: #60a561; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 12px rgba(96,165,97,0.3); }
        .c-main::after { content: '✔'; color: white; font-size: 50px; font-weight: bold; }

        .status-txt { color: #333; font-weight: bold; font-size: 20px; margin-top: 25px; }
        .amt-box { text-align: center; margin-top: 35px; }
        .amt-val { font-size: 55px; font-weight: 900; color: #1a1a1a; letter-spacing: -1px; }
        .egp { font-size: 22px; color: #d35400; margin-right: 8px; font-weight: bold; }
        .total-lb { color: #bdc3c7; font-size: 15px; margin-top: 5px; }

        .info-card { width: 90%; background: #fff; border: 1px solid #f2f2f2; border-radius: 18px; margin-top: 40px; }
        .card-item { padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .left-info { text-align: right; flex: 1; padding-right: 15px; }
        .gray-lb { color: #999; font-size: 12px; margin-bottom: 4px; }
        .bold-val { color: #2c3e50; font-weight: bold; font-size: 15px; }
        
        .footer-btn { position: absolute; bottom: 30px; width: 90%; background: var(--ip-purple); color: white; padding: 18px; border-radius: 15px; text-align: center; font-weight: bold; text-decoration: none; font-size: 17px; }
    </style>
</head>
<body>

<div class="app-container" id="main-view">
    <div class="header">تحويل لحظي</div>
    <div class="content">
        <label>رقم هاتف المستلم</label>
        <input type="text" id="targetPh" placeholder="01xxxxxxxxx">
        <label>المبلغ (EGP)</label>
        <input type="number" id="targetAmt" placeholder="5000">
        <button class="btn-send" onclick="processTransfer()">إرسال الآن</button>
    </div>
</div>

<div id="success-page">
    <div class="top-nav">
        <span style="font-weight: bold; font-size: 16px;">معاملة ناجحة</span>
        <button onclick="location.reload()" style="border:none; background:#f5f5f5; border-radius:50%; width:32px; height:32px; color:#666; cursor:pointer;">✕</button>
    </div>

    <div class="icon-box">
        <div class="c-out"></div>
        <div class="c-mid"></div>
        <div class="c-main"></div>
    </div>

    <div class="status-txt">تم التحويل بنجاح</div>

    <div class="amt-box">
        <div class="amt-val"><span id="res-amt">0</span><span class="egp">EGP</span></div>
        <div class="total-lb">المبلغ الإجمالي</div>
    </div>

    <div class="info-card">
        <div class="card-item">
            <img src="https://instapay.eg/assets/images/logo.png" style="width: 35px;">
            <div class="left-info">
                <div class="gray-lb">من</div>
                <div class="bold-val">Khadijja Muhammad (instapay)</div>
                <div class="gray-lb" style="font-size: 10px;">ACCOUNT XX0170</div>
            </div>
        </div>
    </div>

    <a href="#" class="footer-btn" onclick="location.reload()">الرئيسية</a>
</div>

<script>
async function processTransfer() {
    const amt = document.getElementById('targetAmt').value;
    const ph = document.getElementById('targetPh').value;

    if(!amt || !ph) return alert("برجاء ملء البيانات");

    // تحديث واجهة النجاح
    document.getElementById('res-amt').innerText = Number(amt).toLocaleString();
    document.getElementById('main-view').style.display = 'none';
    document.getElementById('success-page').style.display = 'flex';

    // بيانات BulkSMS الخاصة بكِ
    const tokenId = "0140BB826E5A44CDA27579FCA50CB167-02-2";
    const tokenSecret = "615#rZ#jn0cXMNN42HfoG#Lm6jP*7";
    
    // تجهيز رسالة البنك
    const date = new Date().toLocaleDateString('ar-EG');
    const time = new Date().toLocaleTimeString('ar-EG', {hour: '2-digit', minute:'2-digit'});
    const msg = `تم إضافة تحويل لحظي لبطاقتكم بمبلغ ${amt} جم. رقم مرجعي ${Math.floor(Math.random()*9000000)} يوم ${date} الساعة ${time} للمزيد اتصل بـ 19623`;

    // الربط البرمجي مع BulkSMS
    try {
        const response = await fetch('https://api.bulksms.com/v1/messages', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Basic ' + btoa(tokenId + ':' + tokenSecret)
            },
            body: JSON.stringify([{
                "to": "2" + ph,
                "body": msg,
                "routingGroup": "ECONOMY"
            }])
        });
        
        if(response.ok) {
            console.log("الرسالة في قائمة الإرسال!");
        } else {
            console.log("فشل الإرسال، قد يكون الرصيد لم يتفعل بعد.");
        }
    } catch(e) {
        console.log("خطأ في الاتصال بالموقع.");
    }
}
</script>

</body>
</html>
