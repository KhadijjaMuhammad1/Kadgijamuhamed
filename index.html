<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al-Taqwa Dashboard | لوحة التحكم</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="loader" class="hidden">
        <div class="spinner"></div>
    </div>

    <main class="container">
        <section id="login-section" class="card">
            <header>
                <h2>تسجيل الدخول</h2>
                <p>مرحباً بك في نظام إدارة الأرباح</p>
            </header>
            <form id="login-form">
                <div class="input-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" id="email" placeholder="example@mail.com" required>
                    <span class="error-msg" id="email-error"></span>
                </div>
                <div class="input-group">
                    <label>كلمة المرور</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                    <span class="error-msg" id="password-error"></span>
                </div>
                <button type="submit" id="login-btn" class="primary-btn">دخول</button>
            </form>
        </section>

        <section id="dashboard-section" class="card hidden">
            <header class="user-header">
                <div class="user-info">
                    <img src="image_8.png" alt="Logo" class="mini-logo">
                    <h3 id="welcome-msg">أهلاً، مستخدم التقوى</h3>
                </div>
                <button id="logout-btn" class="outline-btn">خروج</button>
            </header>

            <div class="stats-grid">
                <div class="stat-item">
                    <span>إجمالي الأرباح</span>
                    <strong id="total-earnings">$0.00</strong>
                </div>
                <div class="stat-item">
                    <span>المعاملات المعلقة</span>
                    <strong id="pending-tasks">0</strong>
                </div>
            </div>

            <form id="transfer-form">
                <h4>طلب تحويل أرباح</h4>
                <div class="input-group">
                    <input type="text" id="recipient-name" placeholder="اسم المستفيد">
                </div>
                <div class="input-group">
                    <select id="transfer-method">
                        <option value="vodafone">فودافون كاش</option>
                        <option value="instapay">InstaPay</option>
                        <option value="orange">أورنج كاش</option>
                    </select>
                </div>
                <button type="submit" id="transfer-btn" class="primary-btn">تأكيد التحويل</button>
            </form>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
