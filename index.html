<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al-Taqwa Trading Platform | منصة التقوى العالمية</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <div id="loader" class="hidden">
        <div class="spinner"></div>
    </div>

    <main class="login-wrapper" id="login-section">
        <div class="login-card">
            <header>
                <img src="image.png" alt="Al-Taqwa Logo" class="login-logo">
                <h2>Al-Taqwa Global</h2>
                <p>دخول آمن للمستثمرين</p>
            </header>
            <form id="login-form">
                <input type="password" id="password" placeholder="كود الوصول الشخصي" required>
                <button type="submit" id="login-btn">دخول للمنصة</button>
            </form>
        </div>
    </main>

    <main class="platform-wrapper hidden" id="dashboard-section">
        <header class="platform-header">
            <div class="logo-area">
                <img src="image.png" alt="Logo" class="mini-logo">
                <strong>Al-Taqwa Trading</strong>
            </div>
            <div class="header-tools">
                <div class="balance-status">
                    <small>الرصيد</small>
                    <strong id="total-earnings">EGP 50,000.00</strong>
                </div>
                <button id="logout-btn">خروج</button>
            </div>
        </header>

        <section class="trading-area">
            <div class="chart-container">
                <img src="image_8.png" alt="Trading Chart" class="fake-chart">
                <div class="live-status">LIVE</div>
            </div>
            <aside class="control-panel">
                <div class="asset-selector">
                    <strong>EUR/USD</strong> <span>93%</span>
                </div>
                <div class="input-block">
                    <label>الوقت</label>
                    <input type="text" value="00:01:00" readonly>
                </div>
                <div class="input-block">
                    <label>الاستثمار</label>
                    <input type="text" value="EGP 500.00" readonly>
                </div>
                <div class="trade-buttons">
                    <button class="up-btn">Up</button>
                    <button class="down-btn">Down</button>
                </div>
            </aside>
        </section>

        <section class="payout-area">
            <div class="payout-card">
                <h4>طلب سحب الأرباح</h4>
                <form id="transfer-form">
                    <input type="text" id="recipient-data" placeholder="الاسم الرباعي - رقم الهاتف" required>
                    <select id="transfer-method">
                        <option value="Vodafone Cash">فودافون كاش</option>
                        <option value="InstaPay">InstaPay (IPN)</option>
                        <option value="WE Cash">وي كاش</option>
                    </select>
                    <button type="submit" id="transfer-btn">تأكيد عملية السحب</button>
                </form>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
