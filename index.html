<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأكيد التحويل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #fff; font-family: 'Cairo', sans-serif; overflow-x: hidden; }
        
        .receipt-container {
            position: relative;
            width: 100%;
            max-width: 420px;
            margin: 0 auto;
        }

        .base-img {
            width: 100%;
            height: auto;
            display: block;
        }

        .text-overlay {
            position: absolute;
            color: #000;
            pointer-events: none;
            white-space: nowrap;
        }

        /* تنسيق البيانات فوق الصورة بالملي */
        #val-to { top: 52.8%; left: 16%; font-size: 3.8vw; font-weight: 800; direction: ltr; }
        #val-fees { top: 60.8%; right: 16%; font-size: 4vw; font-family: Arial; font-weight: 900; }
        #val-total { top: 64.5%; right: 16%; font-size: 4vw; font-family: Arial; font-weight: 900; }
        #val-date { top: 71.2%; left: 16%; font-size: 3.2vw; font-family: Arial; font-weight: 900; }
        #val-id { top: 75.2%; left: 16%; font-size: 3.5vw; font-family: Arial; font-weight: 900; }

        @media (min-width: 420px) {
            #val-to { font-size: 16px; }
            #val-fees { font-size: 17px; }
            #val-total { font-size: 17px; }
            #val-date { font-size: 13px; }
            #val-id { font-size: 15px; }
        }

        /* لوحة التحكم المبسطة */
        #admin-box { display:none; position:fixed; inset:0; background:white; z-index:100; padding:25px; overflow-y:auto; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-family: 'Cairo'; font-size: 16px; }
        .btn-save { width:100%; padding:15px; background:#28a745; color:white; border:none; border-radius:10px; font-weight:bold; font-size: 17px; margin-top: 10px; }
        
        /* المنطقة المخفية أسفل اليمين */
        .trigger-zone { position:fixed; bottom:0; right:0; width:60px; height:60px; z-index:101; }
    </style>
</head>
<body>

<div class="trigger-zone" onclick="openAdmin()"></div>

<div id="admin-box">
    <h2 style="color:#e60000">إعدادات الأرباح والرسوم</h2>
    <label>رقم المحفظة (إلى):</label>
    <input type="text" id="in-to" placeholder="اسم أو رقم المستلم">
    <label>مبلغ الأرباح:</label>
    <input type="text" id="in-amount" placeholder="مثال: 50,000.00">
    <label>قيمة الرسوم:</label>
    <input type="text" id="in-fees" placeholder="مثال: 2.49">
    <label>كلمة مرور اللوحة:</label>
    <input type="password" id="admin-pass" placeholder="أدخل 0 أو 1">
    <button class="btn-save" onclick="saveData()">تحديث الإيصال</button>
</div>

<div class="receipt-container">
    <!-- الصورة المرفوعة من قبلك على GitHub -->
    <img src="image_5.png.jpg" class="base-img" alt="Background">
    
    <!-- البيانات المتحركة -->
    <div id="val-to" class="text-overlay"></div>
    <div id="val-fees" class="text-overlay"></div>
    <div id="val-total" class="text-overlay"></div>
    <div id="val-date" class="text-overlay"></div>
    <div id="val-id" class="text-overlay"></div>
</div>

<script>
    let config = JSON.parse(localStorage.getItem('voda_simple')) || {
        to: 'محمد أحمد',
        amount: '50,000.00',
        fees: '2.49'
    };

    function openAdmin() {
        let p = prompt("الباسورد لفتح اللوحة:");
        if(p === "0" || p === "1") {
            document.getElementById('in-to').value = config.to;
            document.getElementById('in-amount').value = config.amount;
            document.getElementById('in-fees').value = config.fees;
            document.getElementById('admin-box').style.display = 'block';
        }
    }

    function saveData() {
        config = {
            to: document.getElementById('in-to').value,
            amount: document.getElementById('in-amount').value,
            fees: document.getElementById('in-fees').value
        };
        localStorage.setItem('voda_simple', JSON.stringify(config));
        alert("تم تحديث البيانات بنجاح");
        location.reload();
    }

    window.onload = function() {
        // عرض البيانات الأساسية
        document.getElementById('val-fees').innerText = config.fees + " جنيه";
        document.getElementById('val-total').innerText = config.amount + " جنيه";
        document.getElementById('val-to').innerText = "*******| ******| " + config.to;

        // توليد تاريخ ووقت العملية الحالي
        let now = new Date();
        let dateStr = now.toLocaleDateString('en-GB') + " - " + 
                      now.toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit', hour12: false});
        document.getElementById('val-date').innerText = dateStr;

        // توليد رقم عملية عشوائي يبدأ بـ 35
        let randomID = "35" + Math.floor(Math.random() * 900000000);
        document.getElementById('val-id').innerText = randomID;
    }
</script>

</body>
</html>
